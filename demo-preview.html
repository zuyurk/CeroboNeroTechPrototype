<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cerebro NeuroTech — Demo Landing Page v0</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
:root {
  --primary: #00f5c4;
  --danger: #ff3355;
  --warning: #ffaa00;
  --dark: #040810;
  --darker: #020508;
  --card: #080f1a;
  --card-hover: #0c1420;
  --border: rgba(0,245,196,0.14);
  --border-sub: rgba(0,245,196,0.07);
  --text: #b0c8d8;
  --dim: #6a8898;
  --white: #eaf4ff;
  --header-h: 58px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;overflow-x:hidden;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.055) 2px,rgba(0,0,0,0.055) 4px);pointer-events:none;z-index:9999;}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,196,0.028) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,196,0.028) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}

/* HEADER */
.app-header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:rgba(4,8,16,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:100;}
.header-inner{max-width:1280px;margin:0 auto;height:100%;padding:0 48px;display:flex;align-items:center;justify-content:space-between;}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;letter-spacing:3px;color:var(--white);}
.logo-c{color:var(--primary);}
.header-right{display:flex;align-items:center;gap:16px;}
.header-badge{font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:2px;color:var(--primary);border:1px solid rgba(0,245,196,0.3);padding:4px 12px;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);}
.header-ver{font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:1px;color:var(--dim);}

/* LANDING */
.landing{padding-top:var(--header-h);min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1;}
.intro{padding:64px 48px 40px;max-width:1280px;margin:0 auto;width:100%;}
.intro-inner{max-width:700px;}
.intro-label{font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:4px;color:var(--primary);margin-bottom:14px;animation:fu .6s ease both;}
.intro-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,6vw,5rem);line-height:.94;letter-spacing:3px;color:var(--white);margin-bottom:18px;animation:fu .6s .1s ease both;}
.title-accent{color:var(--primary);}
.intro-desc{font-size:1rem;color:var(--text);line-height:1.7;max-width:560px;margin-bottom:28px;animation:fu .6s .2s ease both;}
.intro-meta{display:flex;align-items:center;gap:24px;animation:fu .6s .3s ease both;}
.mi{display:flex;flex-direction:column;gap:3px;}
.mn{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--primary);letter-spacing:2px;line-height:1;}
.ml{font-family:'Space Mono',monospace;font-size:0.56rem;letter-spacing:2px;color:var(--dim);}
.mdiv{width:1px;height:36px;background:var(--border);}

/* SCENARIOS */
.scenarios-section{flex:1;padding:0 48px 48px;max-width:1280px;margin:0 auto;width:100%;}
.scenarios-label{display:flex;align-items:center;justify-content:space-between;font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:3px;color:var(--dim);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border-sub);}
.sc-count{color:var(--primary);}
.scenarios-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;animation:fu .6s .35s ease both;}

/* CARD */
.sc-card{background:var(--card);border:1px solid var(--border-sub);padding:28px 24px;cursor:pointer;position:relative;overflow:hidden;transition:background .25s,border-color .25s,transform .2s;display:flex;flex-direction:column;gap:10px;}
.sc-card:hover{background:var(--card-hover);transform:translateY(-2px);}
.card-bar{position:absolute;top:0;left:0;right:0;height:2px;transform:scaleX(0);transform-origin:left;transition:transform .3s;}
.sc-card:hover .card-bar{transform:scaleX(1);}
.card-tag{font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:2px;border:1px solid;display:inline-block;padding:3px 8px;width:fit-content;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:2px;color:var(--white);line-height:1;}
.card-sub{font-family:'Space Mono',monospace;font-size:0.62rem;letter-spacing:1px;color:var(--dim);}
.card-summary{font-size:0.88rem;color:var(--text);line-height:1.65;flex:1;}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:14px;border-top:1px solid var(--border-sub);}
.pri-badge{font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:2px;}
.start-btn{font-family:'Space Mono',monospace;font-size:0.65rem;font-weight:700;letter-spacing:2px;color:var(--dark);border:none;padding:8px 18px;cursor:pointer;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:opacity .2s,transform .2s;}
.start-btn:hover{opacity:.88;transform:scale(.98);}

/* FOOTER */
.l-footer{padding:18px 48px;border-top:1px solid var(--border-sub);display:flex;align-items:center;justify-content:space-between;max-width:1280px;margin:0 auto;width:100%;}
.f-logo{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:3px;color:var(--white);}
.f-disc{font-family:'Space Mono',monospace;font-size:0.56rem;letter-spacing:1px;color:var(--dim);}
.f-ver{font-family:'Space Mono',monospace;font-size:0.56rem;color:rgba(0,245,196,.4);letter-spacing:1px;}

/* DETAIL */
.detail-main{padding-top:var(--header-h);min-height:100vh;position:relative;z-index:1;}
.detail-view{max-width:1280px;margin:0 auto;padding:40px 48px 60px;opacity:0;transform:translateY(14px);transition:opacity .4s,transform .4s;}
.detail-view.vis{opacity:1;transform:none;}
.detail-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.back-btn{font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:2px;color:var(--text);background:transparent;border:1px solid var(--border);padding:8px 18px;cursor:pointer;transition:all .2s;}
.back-btn:hover{border-color:var(--primary);color:var(--primary);}
.d-tag{font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:2px;border:1px solid;padding:4px 12px;}
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border);}
.d-sess-label{font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:3px;color:var(--primary);margin-bottom:10px;}
.d-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,4vw,3.4rem);letter-spacing:3px;color:var(--white);line-height:1;margin-bottom:6px;}
.d-subtitle{font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:1px;color:var(--dim);}
.pri-flag{display:flex;align-items:center;gap:8px;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;border:1px solid;padding:10px 18px;flex-shrink:0;}
.pri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulse 1.8s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,245,196,.5);}50%{box-shadow:0 0 0 6px rgba(0,245,196,0);}}

.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
.d-left,.d-right{display:flex;flex-direction:column;gap:2px;}
.d-panel{background:var(--card);border:1px solid var(--border-sub);padding:20px 22px;}
.panel-lbl{font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:3px;color:var(--primary);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border-sub);}
.info-row{display:flex;justify-content:space-between;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--border-sub);}
.info-row:last-child{border-bottom:none;}
.ik{font-family:'Space Mono',monospace;font-size:0.62rem;letter-spacing:1px;color:var(--dim);flex-shrink:0;}
.iv{font-size:.9rem;color:var(--white);text-align:right;}
.status-badge{display:flex;align-items:center;gap:10px;padding:12px 16px;border:1px solid;font-family:'Space Mono',monospace;font-size:0.72rem;letter-spacing:1px;}
.s-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;animation:pulse 1.8s ease-in-out infinite;}
.nextstep-txt{font-size:.93rem;color:var(--text);line-height:1.65;padding-left:14px;border-left:2px solid;}
.meta-list{display:flex;flex-direction:column;gap:0;}
.meta-row{display:flex;justify-content:space-between;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid var(--border-sub);}
.meta-row:last-child{border-bottom:none;}
.mk{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:1px;color:var(--dim);flex-shrink:0;}
.mv{font-size:.88rem;color:var(--white);text-align:right;}

.ts-layers{display:flex;flex-direction:column;gap:8px;}
.layer-item{display:flex;align-items:center;gap:14px;padding:10px 14px;border:1px solid var(--border-sub);background:var(--darker);transition:border-color .2s;}
.layer-item.done{border-color:rgba(0,245,196,.22);}
.layer-item.active{border-color:rgba(0,245,196,.45);}
.l-ind{width:28px;height:28px;border-radius:50%;border:1px solid var(--dim);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.65rem;color:var(--dim);flex-shrink:0;transition:all .3s;}
.layer-item.active .l-ind{border-color:var(--primary);color:var(--primary);animation:pulse 1.5s ease-in-out infinite;}
.l-name{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--white);flex:1;}
.l-status{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:1px;color:var(--dim);}
.layer-item.done .l-status{color:var(--primary);}
.layer-item.active .l-status{color:var(--warning);}

.d-footer{display:flex;align-items:center;justify-content:space-between;margin-top:24px;padding-top:18px;border-top:1px solid var(--border-sub);}
.reset-btn{font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:2px;color:var(--primary);background:transparent;border:1px solid rgba(0,245,196,.3);padding:10px 22px;cursor:pointer;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:all .2s;}
.reset-btn:hover{background:rgba(0,245,196,.1);border-color:var(--primary);}
.disc{font-family:'Space Mono',monospace;font-size:.57rem;letter-spacing:1px;color:rgba(255,170,0,.6);}

@keyframes fu{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:900px){.scenarios-grid,.d-grid{grid-template-columns:1fr;}.header-inner,.intro,.scenarios-section,.l-footer,.detail-view{padding-left:24px;padding-right:24px;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ── MOCK DATA ──────────────────────────────────────────────
const SCENARIOS = [
  {
    id: 'pediatric-athlete',
    title: 'Pediatric Athlete',
    subtitle: 'Youth Football — Age 14',
    summary: 'Sideline evaluation following a helmet-to-helmet collision during a Friday night game. Player reported momentary disorientation and was removed by the coach.',
    tag: 'YOUTH SPORT',
    tagColor: '#00f5c4',
    detail: {
      sessionType: 'Sideline — Acute Evaluation',
      patientProfile: 'Male, Age 14 — Youth League (Mock)',
      status: 'Evaluation In Progress',
      nextStep: 'Initiate TriScan™ Protocol — Helmet Scan → Cognitive Test → Blood Panel',
      protocol: 'TriScan™ v2.1 — Pediatric',
      estimatedDuration: '3–4 minutes',
      priority: 'HIGH',
      metadata: {
        'Session ID': 'DEMO-PA-001',
        'Sport': 'Football',
        'Impact Type': 'Helmet-to-Helmet',
        'Reported Symptoms': 'Disorientation, Dizziness',
        'Prior Concussions': '0',
        'Baseline On File': 'Yes',
      },
      layers: ['pending','pending','pending'],
    },
  },
  {
    id: 'adult-followup',
    title: 'Adult Follow-Up',
    subtitle: 'Post-Event Monitoring — Day 5',
    summary: 'Return-to-play assessment for an adult recreational athlete five days after a diagnosed Grade I concussion. Monitoring symptom resolution and cognitive baseline recovery.',
    tag: 'FOLLOW-UP',
    tagColor: '#ffaa00',
    detail: {
      sessionType: 'Clinical — Return-to-Play',
      patientProfile: 'Female, Age 31 — Recreational Soccer (Mock)',
      status: 'Monitoring — Day 5 of 7',
      nextStep: 'Comparative Cognitive Retest — Compare Against Day 1 Baseline',
      protocol: 'TriScan™ v2.1 — Adult Follow-Up',
      estimatedDuration: '4–5 minutes',
      priority: 'MEDIUM',
      metadata: {
        'Session ID': 'DEMO-AF-002',
        'Sport': 'Soccer',
        'Initial Diagnosis': 'Grade I Concussion',
        'Days Post-Injury': '5',
        'Current Symptoms': 'Mild Headache (Reported)',
        'Clearance Status': 'Pending',
      },
      layers: ['done','pending','pending'],
    },
  },
  {
    id: 'sideline-evaluation',
    title: 'Sideline Evaluation',
    subtitle: 'Professional — In-Game Protocol',
    summary: 'Real-time sideline TBI screening for a professional athlete following a high-impact tackle. Full TriScan™ protocol initiated by medical staff within 60 seconds of the event.',
    tag: 'PRO LEAGUE',
    tagColor: '#ff3355',
    detail: {
      sessionType: 'Sideline — Professional Protocol',
      patientProfile: 'Male, Age 26 — Professional Football (Mock)',
      status: 'Protocol Active — Awaiting Final Results',
      nextStep: 'Blood Biomarker Panel — Final Layer Before AI Synthesis',
      protocol: 'TriScan™ v2.1 — Pro Sideline',
      estimatedDuration: '< 4 minutes',
      priority: 'CRITICAL',
      metadata: {
        'Session ID': 'DEMO-SE-003',
        'Sport': 'Professional Football',
        'Impact G-Force (Mock)': '72g',
        'Helmet Scan': '✓ Complete — Anomaly Detected',
        'Cognitive Test': '✓ Complete — Deficit Flagged',
        'Blood Panel': '⏳ In Progress',
      },
      layers: ['done','done','active'],
    },
  },
];

// ── HEADER ─────────────────────────────────────────────────
function Header() {
  return (
    <header className="app-header">
      <div className="header-inner">
        <div className="header-logo">
          <span className="logo-c">CEREBRO</span> NEUROTECH
        </div>
        <div className="header-right">
          <div className="header-badge">DEMO ENVIRONMENT</div>
          <div className="header-ver">v0.1.0</div>
        </div>
      </div>
    </header>
  );
}

// ── SCENARIO CARD ───────────────────────────────────────────
function ScenarioCard({ scenario, onSelect }) {
  const ac = scenario.tagColor;
  return (
    <div
      className="sc-card"
      style={{ '--ac': ac }}
      onClick={() => onSelect(scenario)}
    >
      <div className="card-bar" style={{ background: ac }} />
      <div className="card-tag" style={{ color: ac, borderColor: ac + '40' }}>
        {scenario.tag}
      </div>
      <div className="card-title">{scenario.title}</div>
      <div className="card-sub">{scenario.subtitle}</div>
      <div className="card-summary">{scenario.summary}</div>
      <div className="card-footer">
        <div className="pri-badge" style={{ color: ac }}>
          {scenario.detail.priority} PRIORITY
        </div>
        <button
          className="start-btn"
          style={{ background: ac }}
          onClick={e => { e.stopPropagation(); onSelect(scenario); }}
        >
          START DEMO
        </button>
      </div>
    </div>
  );
}

// ── SCENARIO DETAIL ─────────────────────────────────────────
function ScenarioDetail({ scenario, onReset }) {
  const [vis, setVis] = useState(false);
  useEffect(() => { setTimeout(() => setVis(true), 30); }, []);
  const ac = scenario.tagColor;
  const layerNames = ['HELMET SCAN', 'COGNITIVE TEST', 'BLOOD PANEL'];

  return (
    <div className={`detail-view ${vis ? 'vis' : ''}`}>
      {/* Top bar */}
      <div className="detail-topbar">
        <button className="back-btn" onClick={onReset}>← BACK TO SCENARIOS</button>
        <div className="d-tag" style={{ color: ac, borderColor: ac + '40' }}>{scenario.tag}</div>
      </div>

      {/* Header */}
      <div className="detail-header">
        <div>
          <div className="d-sess-label">ACTIVE DEMO SESSION</div>
          <div className="d-title">{scenario.title}</div>
          <div className="d-subtitle">{scenario.subtitle}</div>
        </div>
        <div className="pri-flag" style={{ color: ac, borderColor: ac }}>
          <div className="pri-dot" style={{ background: ac }} />
          {scenario.detail.priority}
        </div>
      </div>

      {/* Grid */}
      <div className="d-grid">
        <div className="d-left">
          {/* Session info */}
          <div className="d-panel">
            <div className="panel-lbl">SESSION INFO</div>
            {[
              ['Session Type', scenario.detail.sessionType],
              ['Patient Profile', scenario.detail.patientProfile],
              ['Protocol', scenario.detail.protocol],
              ['Est. Duration', scenario.detail.estimatedDuration],
            ].map(([k, v]) => (
              <div className="info-row" key={k}>
                <span className="ik">{k}</span>
                <span className="iv">{v}</span>
              </div>
            ))}
          </div>
          {/* Status */}
          <div className="d-panel">
            <div className="panel-lbl">STATUS</div>
            <div className="status-badge" style={{ color: ac, borderColor: ac + '30', background: ac + '08' }}>
              <div className="s-dot" style={{ background: ac }} />
              {scenario.detail.status}
            </div>
          </div>
          {/* Next step */}
          <div className="d-panel">
            <div className="panel-lbl">NEXT STEP</div>
            <p className="nextstep-txt" style={{ borderLeftColor: ac }}>{scenario.detail.nextStep}</p>
          </div>
        </div>

        <div className="d-right">
          {/* Metadata */}
          <div className="d-panel" style={{ flex: 1 }}>
            <div className="panel-lbl">SESSION METADATA</div>
            <div className="meta-list">
              {Object.entries(scenario.detail.metadata).map(([k, v]) => (
                <div className="meta-row" key={k}>
                  <span className="mk">{k}</span>
                  <span className="mv">{v}</span>
                </div>
              ))}
            </div>
          </div>
          {/* TriScan layers */}
          <div className="d-panel">
            <div className="panel-lbl">TRISCAN™ LAYERS</div>
            <div className="ts-layers">
              {layerNames.map((name, i) => {
                const state = scenario.detail.layers[i];
                return (
                  <div key={name} className={`layer-item ${state}`}>
                    <div className="l-ind" style={state === 'done' ? { background: ac, borderColor: ac, color: '#040810' } : state === 'active' ? { borderColor: ac } : {}}>
                      {state === 'done' ? '✓' : state === 'active' ? '●' : String(i + 1)}
                    </div>
                    <span className="l-name">{name}</span>
                    <span className="l-status">
                      {state === 'done' ? 'COMPLETE' : state === 'active' ? 'IN PROGRESS' : 'PENDING'}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>

      {/* Footer */}
      <div className="d-footer">
        <button className="reset-btn" onClick={onReset}>↺ RESET DEMO</button>
        <div className="disc">⚠ MOCK DATA ONLY — No real patient information. Demo environment.</div>
      </div>
    </div>
  );
}

// ── APP ROOT ────────────────────────────────────────────────
function App() {
  const [view, setView] = useState('landing');
  const [selected, setSelected] = useState(null);

  const handleSelect = (s) => { setSelected(s); setView('detail'); };
  const handleReset = () => { setView('landing'); setSelected(null); };

  return (
    <div className="app">
      <Header />

      {view === 'landing' && (
        <main className="landing">
          <section className="intro">
            <div className="intro-inner">
              <div className="intro-label">// TRISCAN™ DEMO PLATFORM — V0</div>
              <h1 className="intro-title">
                CEREBRO<br/>
                <span className="title-accent">TBI DETECTION</span><br/>
                DEMO
              </h1>
              <p className="intro-desc">
                Select a scenario below to explore the TriScan™ diagnostic protocol in action.
                Each scenario represents a distinct clinical use case — from youth sports to
                professional sideline evaluation. All data is synthetic and for demonstration only.
              </p>
              <div className="intro-meta">
                <div className="mi"><span className="mn">3</span><span className="ml">DEMO SCENARIOS</span></div>
                <div className="mdiv" />
                <div className="mi"><span className="mn">3</span><span className="ml">DIAGNOSTIC LAYERS</span></div>
                <div className="mdiv" />
                <div className="mi"><span className="mn">&lt;4MIN</span><span className="ml">PER EVALUATION</span></div>
              </div>
            </div>
          </section>

          <section className="scenarios-section">
            <div className="scenarios-label">
              <span>// SELECT A DEMO SCENARIO</span>
              <span className="sc-count">{SCENARIOS.length} AVAILABLE</span>
            </div>
            <div className="scenarios-grid">
              {SCENARIOS.map(s => (
                <ScenarioCard key={s.id} scenario={s} onSelect={handleSelect} />
              ))}
            </div>
          </section>

          <footer className="l-footer">
            <span className="f-logo"><span style={{color:'#00f5c4'}}>CEREBRO</span> NEUROTECH INC.</span>
            <span className="f-disc">MOCK DATA ONLY — Demo environment. No real patient data.</span>
            <span className="f-ver">Demo Landing Page v0 · 2026</span>
          </footer>
        </main>
      )}

      {view === 'detail' && selected && (
        <main className="detail-main">
          <ScenarioDetail scenario={selected} onReset={handleReset} />
        </main>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
